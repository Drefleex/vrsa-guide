[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_GOOGLE_MAPS_KEY = "AIzaSyBE2b2U5JlVidPhOOy0s0e4FtRhxF6zg3Q"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"