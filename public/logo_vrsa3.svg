
                <!-- SVG ULTRA-WIDE (1200x400) - SEGURANÇA TOTAL PARA O TEXTO EM LINHA -->
                <svg viewBox="0 0 1200 450" xmlns="http://www.w3.org/2000/svg" class="w-full max-w-5xl h-auto">
                    <defs>
                        <linearGradient id="vPrism" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#00f2ff"></stop>
                            <stop offset="35%" style="stop-color:#10b981"></stop>
                            <stop offset="65%" style="stop-color:#fbbf24"></stop>
                            <stop offset="100%" style="stop-color:#f43f5e"></stop>
                        </linearGradient>
                    </defs>

                    <!-- Monograma V (Centralizado no topo) -->
                    <g transform="translate(600, 160)">
                        <g transform="translate(-80, -110)">
                            <path d="M 10 10 L 80 160 L 150 10" fill="none" stroke="url(#vPrism)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" class="tech-gradient-v"></path>
                            <circle cx="80" cy="160" r="9" fill="#ffffff"></circle>
                        </g>
                    </g>

                    <!-- Texto em Linha Única (Centralizado abaixo do V) -->
                    <!-- Title Case: Vila Real Santo Antonio -->
                    <g transform="translate(600, 320)" text-anchor="middle">
                        <text font-family="'Inter', sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">
                            Vila Real Santo Antonio
                        </text>
                    </g>
                </svg>
            