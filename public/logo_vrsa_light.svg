<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="prismBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1"></stop>
            <stop offset="100%" style="stop-color:#0062ff;stop-opacity:1"></stop>
        </linearGradient>
        <linearGradient id="prismGold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"></stop>
            <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1"></stop>
        </linearGradient>
        <filter id="navyNeon" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
            <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
        </filter>
    </defs>

    <g transform="translate(80, 60)" filter="url(#navyNeon)">
        <path d="M 0 0 L 60 160 L 60 40 Z" fill="url(#prismBlue)" opacity="0.8"></path>
        <path d="M 120 0 L 60 160 L 60 40 Z" fill="url(#prismGold)" opacity="0.8"></path>
        <circle cx="60" cy="160" r="8" fill="#ffffff"></circle>
        <path d="M 60 40 V 160" stroke="white" stroke-width="1" opacity="0.3"></path>
    </g>

    <g transform="translate(300, 140)">
        <text font-family="'Plus Jakarta Sans', sans-serif" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-3">VILA REAL</text>
        <text y="58" font-family="'Plus Jakarta Sans', sans-serif" font-size="38" font-weight="300" fill="rgba(255,255,255,0.55)" letter-spacing="22">SANTO ANTÓNIO</text>
        <rect y="90" width="480" height="1.5" fill="url(#prismBlue)" opacity="0.4"></rect>
        <text y="125" font-family="'Plus Jakarta Sans', sans-serif" font-size="16" font-weight="800" fill="#00f2ff" letter-spacing="9">TECH TOURISM • SMART APP • 2026</text>
    </g>
</svg>
