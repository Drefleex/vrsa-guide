
                <!-- SVG OTIMIZADO: Viewbox 1000x250 garante espaço total para o "O" final -->
                <svg viewBox="0 0 1000 250" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto">
                    <defs>
                        <linearGradient id="vGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#00f2ff"></stop>
                            <stop offset="35%" style="stop-color:#10b981"></stop>
                            <stop offset="65%" style="stop-color:#fbbf24"></stop>
                            <stop offset="100%" style="stop-color:#f43f5e"></stop>
                        </linearGradient>
                    </defs>

                    <!-- Monograma V (Posição Centralizada) -->
                    <g transform="translate(60, 65)">
                        <path d="M 10 10 L 55 105 L 100 10" fill="none" stroke="url(#vGradient)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"></path>
                        <circle cx="55" cy="105" r="7" fill="#ffffff"></circle>
                    </g>

                    <!-- Tipografia Profissional (Margem de Segurança Total) -->
                    <g transform="translate(220, 110)">
                        <!-- VILA REAL -->
                        <text font-family="'Inter', sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-3">VILA REAL</text>
                        <!-- SANTO ANTÓNIO (Alinhado e corrigido) -->
                        <text y="42" font-family="'Inter', sans-serif" font-size="34" font-weight="400" fill="#94a3b8" letter-spacing="11.5">SANTO ANTÓNIO</text>
                    </g>
                </svg>
            