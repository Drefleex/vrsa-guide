<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA (manifest.webmanifest generated by vite-plugin-pwa at build time) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VRSA Guide" />
    <meta name="application-name" content="VRSA Guide" />
    <meta name="theme-color" content="#06152B" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- SEO -->
    <title>VRSA Guide — Vila Real de Santo António</title>
    <meta name="description" content="O guia turístico completo de Vila Real de Santo António. Restaurantes, praias, eventos, transportes e muito mais em 5 idiomas." />
    <meta name="keywords" content="Vila Real de Santo António, VRSA, Algarve, Portugal, turismo, guia, restaurantes, praias, ferry" />
    <meta name="author" content="Câmara Municipal de VRSA" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://guia-vrsa.netlify.app/" />
    <meta property="og:title"       content="VRSA Guide — Vila Real de Santo António" />
    <meta property="og:description" content="O guia turístico completo de Vila Real de Santo António. Restaurantes, praias, eventos e muito mais em 5 idiomas." />
    <meta property="og:image"       content="https://guia-vrsa.netlify.app/screenshot-home.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="pt_PT" />
    <meta property="og:locale:alternate" content="en_GB" />
    <meta property="og:locale:alternate" content="es_ES" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="VRSA Guide" />
    <meta name="twitter:description" content="O guia turístico de Vila Real de Santo António — Algarve, Portugal" />
    <meta name="twitter:image"       content="https://guia-vrsa.netlify.app/screenshot-home.png" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts — non-blocking (preload + onload swap) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" /></noscript>

    <!-- Critical CSS — fundo branco imediato para a base da PWA (safe area) -->
    <style>html,body,#root{height:100%;margin:0;background:#FFFFFF;}</style>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
